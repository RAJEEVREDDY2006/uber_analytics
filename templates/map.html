<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geo Heatmap — Uber Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#09090f;color:#e8e8f0;font-family:'Syne',sans-serif}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;background:#111118;border-bottom:1px solid #22222e;
  position:sticky;top:0;z-index:999
}
.topbar h2{font-size:16px;font-weight:700}
.topbar h2 span{color:#1dbf73}
.back-btn{
  background:transparent;border:1px solid #22222e;color:#6b6b7e;
  padding:7px 16px;border-radius:8px;font-family:'Syne',sans-serif;
  font-size:13px;cursor:pointer;text-decoration:none;transition:.2s
}
.back-btn:hover{border-color:#1dbf73;color:#1dbf73}
.info-bar{
  padding:10px 28px;background:#0f0f18;border-bottom:1px solid #22222e;
  font-size:12px;color:#6b6b7e;display:flex;gap:20px;align-items:center
}
.info-bar strong{color:#1dbf73}
.map-frame{
  width:100%;height:calc(100vh - 100px);border:none
}
</style>
</head>
<body>

<div class="topbar">
  <h2>🗺 Uber <span>Geo Heatmap</span> — NYC April 2014</h2>
  <a href="/" class="back-btn">← Back to Dashboard</a>
</div>

<div class="info-bar">
  <span>Showing: <strong>{{ 'Hour ' + hour_filter|string if hour_filter is not none else 'All Hours' }}</strong></span>
  <span>·</span>
  <span>Green circles = demand zone centroids</span>
  <span>·</span>
  <span>Brighter = higher density</span>
  <span>·</span>
  <span>Filter by hour: 
    {% for h in [0,6,9,12,17,21] %}
    <a href="/map?hour={{ h }}" style="color:#1dbf73;margin:0 4px">{{ h }}:00</a>
    {% endfor %}
    <a href="/map" style="color:#6b6b7e;margin:0 4px">All</a>
  </span>
</div>

<iframe class="map-frame" srcdoc="{{ map_html | e }}"></iframe>

</body>
</html>
